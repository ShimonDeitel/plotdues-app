name: Plotdues
options:
  bundleIdPrefix: com.shimondeitel.gardendues
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Plotdues:
    type: application
    platform: iOS
    sources:
      - path: Plotdues
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.gardendues
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Plotdues/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  PlotduesTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PlotduesTests
      - path: Plotdues.storekit
    dependencies:
      - target: Plotdues
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.gardendues.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  PlotduesUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PlotduesUITests
    dependencies:
      - target: Plotdues
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.gardendues.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Plotdues:
    build:
      targets:
        Plotdues: all
        PlotduesTests: [test]
        PlotduesUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Plotdues.storekit
    test:
      config: Debug
      storeKitConfiguration: Plotdues.storekit
      targets:
        - PlotduesTests
        - PlotduesUITests
    archive:
      config: Release
